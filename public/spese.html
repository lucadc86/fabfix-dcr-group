<!DOCTYPE html>
<html lang="it">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <base href="/">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spese – DCR Group</title>

  <link rel="stylesheet" href="styles.css?v=15_20260225222215" />
  <link rel="stylesheet" href="mobile.css?v=15_20260225222215" />
  <link rel="stylesheet" href="spese.css?v=rebuild_v1" />

  <script type="module" src="/auth-guard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body class="page sp-page">

  <!-- ── Top bar ── -->
  <header class="top-bar sp-topbar">
    <button class="back-btn" id="backBtn" title="Torna indietro">←</button>
    <span class="page-title">Spese</span>
    <select id="quickNav" class="quick-nav">
      <option value="">Vai a…</option>
      <option value="index.html">HOME</option>
      <option value="clients.html">CLIENTI</option>
      <option value="suppliers.html">FORNITORI</option>
      <option value="scadenze.html">SCADENZE</option>
      <option value="incassi.html">INCASSI</option>
      <option value="spese.html" selected>SPESE</option>
      <option value="listini.html">LISTINI</option>
      <option value="statistiche.html">STATISTICHE</option>
      <option value="agenda.html">AGENDA</option>
      <option value="ordini-clienti.html">ORDINI CLIENTI</option>
      <option value="finanze.html">FINANZE</option>
    </select>
  </header>

  <!-- ── Main ── -->
  <main class="sp-main" id="spMain">

    <!-- KPI Strip -->
    <section class="sp-kpi-strip" aria-label="Indicatori spese">
      <div class="sp-kpi-card">
        <div class="sp-kpi-label">Totale anno</div>
        <div class="sp-kpi-value" id="kpiAnno">—</div>
        <div class="sp-kpi-badge">ANNO</div>
      </div>
      <div class="sp-kpi-card">
        <div class="sp-kpi-label">Totale mese corrente</div>
        <div class="sp-kpi-value" id="kpiMese">—</div>
        <div class="sp-kpi-badge">MESE</div>
      </div>
      <div class="sp-kpi-card">
        <div class="sp-kpi-label">Media mensile</div>
        <div class="sp-kpi-value" id="kpiMedia">—</div>
        <div class="sp-kpi-badge">MEDIA</div>
      </div>
      <div class="sp-kpi-card">
        <div class="sp-kpi-label">Num. spese mese</div>
        <div class="sp-kpi-value" id="kpiNumMese">—</div>
        <div class="sp-kpi-badge">CONTEGGIO</div>
      </div>
    </section>

    <!-- Action bar -->
    <section class="sp-action-bar" aria-label="Azioni e filtri">
      <button class="sp-btn primary" id="btnNew" title="Nuova spesa">＋ Nuova spesa</button>

      <input type="search" id="speseSearch" class="sp-input sp-search"
             placeholder="🔍 Cerca per nota o categoria…" autocomplete="off" />

      <select id="catFilter" class="sp-select" title="Filtra per categoria">
        <option value="">Tutte le categorie</option>
        <option value="prodotti">Prodotti</option>
        <option value="attrezzatura">Attrezzatura</option>
        <option value="servizi">Servizi</option>
        <option value="utenze">Utenze</option>
        <option value="personale">Personale</option>
        <option value="marketing">Marketing</option>
        <option value="affitto">Affitto</option>
        <option value="fornitori">Fornitori</option>
        <option value="altro">Altro</option>
      </select>

      <select id="monthFilter" class="sp-select" title="Filtra per mese">
        <option value="0">Tutti i mesi</option>
        <option value="1">Gennaio</option>
        <option value="2">Febbraio</option>
        <option value="3">Marzo</option>
        <option value="4">Aprile</option>
        <option value="5">Maggio</option>
        <option value="6">Giugno</option>
        <option value="7">Luglio</option>
        <option value="8">Agosto</option>
        <option value="9">Settembre</option>
        <option value="10">Ottobre</option>
        <option value="11">Novembre</option>
        <option value="12">Dicembre</option>
      </select>

      <select id="yearFilter" class="sp-select" title="Filtra per anno">
      </select>

      <div class="sp-sort-group">
        <button class="sp-sort-btn active" id="sortDateBtn" title="Ordina per data">📅 Data</button>
        <button class="sp-sort-btn" id="sortAmtBtn" title="Ordina per importo">€ Importo</button>
      </div>

      <div class="sp-action-sep"></div>

      <button class="sp-btn" id="btnExportSpese" title="Esporta CSV">⬇ CSV</button>
    </section>

    <!-- Expense list -->
    <section class="sp-list-section">
      <div class="sp-list-header">
        <span class="sp-list-title">📋 Elenco Spese</span>
        <span class="sp-list-count" id="listCount">—</span>
      </div>
      <div id="speseList">
        <div class="sp-loading">⏳ Caricamento spese…</div>
      </div>
    </section>

    <!-- Charts (collapsible) -->
    <section class="sp-charts-section">
      <div class="sp-charts-toggle" id="chartsToggle" role="button" tabindex="0"
           aria-expanded="false" aria-controls="chartsBody">
        <span class="sp-charts-toggle-title">📊 Grafici</span>
        <span class="sp-charts-toggle-icon">▼</span>
      </div>
      <div class="sp-charts-body" id="chartsBody" aria-hidden="true">
        <div class="sp-chart-wrap">
          <div class="sp-chart-label">Spese mensili – ultimi 12 mesi</div>
          <canvas id="barChart"></canvas>
        </div>
        <div class="sp-chart-wrap">
          <div class="sp-chart-label">Ripartizione per categoria (periodo selezionato)</div>
          <canvas id="donutChart"></canvas>
        </div>
      </div>
    </section>

  </main>

  <!-- ── Add / Edit Modal ── -->
  <div class="sp-modal-overlay hidden" id="speseModal" role="dialog" aria-modal="true"
       aria-labelledby="modalTitle">
    <div class="sp-modal">
      <div class="sp-modal-head">
        <span class="sp-modal-title" id="modalTitle">Nuova Spesa</span>
        <button class="sp-modal-close" id="btnCancel2" title="Chiudi">✕</button>
      </div>
      <div class="sp-modal-body">
        <div class="sp-field-row">
          <div class="sp-field">
            <label for="fDate">Data *</label>
            <input type="date" id="fDate" required />
          </div>
          <div class="sp-field">
            <label for="fAmount">Importo (€) *</label>
            <input type="number" id="fAmount" min="0" step="0.01" placeholder="0,00" required />
          </div>
        </div>
        <div class="sp-field">
          <label for="fCat">Categoria</label>
          <select id="fCat">
            <option value="prodotti">Prodotti</option>
            <option value="attrezzatura">Attrezzatura</option>
            <option value="servizi">Servizi</option>
            <option value="utenze">Utenze</option>
            <option value="personale">Personale</option>
            <option value="marketing">Marketing</option>
            <option value="affitto">Affitto</option>
            <option value="fornitori">Fornitori</option>
            <option value="altro" selected>Altro</option>
          </select>
        </div>
        <div class="sp-field">
          <label for="fNote">Nota / Descrizione</label>
          <textarea id="fNote" placeholder="Descrizione spesa…" rows="3"></textarea>
        </div>
        <div class="sp-field" id="sourceField" style="display:none">
          <label>Fonte</label>
          <div class="sp-field-source" id="fSource">—</div>
        </div>
      </div>
      <div class="sp-modal-actions">
        <button class="sp-btn danger" id="btnDelete" style="display:none;margin-right:auto">🗑 Elimina</button>
        <button class="sp-btn" id="btnCancel">Annulla</button>
        <button class="sp-btn primary" id="btnSave">💾 Salva</button>
      </div>
    </div>
  </div>

  <script type="module" src="spese.js?v=rebuild_v1"></script>

  <script type="module">
    import { exportSpese } from './services/exportService.js';
    import { listExpenses } from './services/expenseService.js';
    document.getElementById('btnExportSpese')?.addEventListener('click', async () => {
      try { const expenses = await listExpenses(); exportSpese(expenses); } catch (e) { alert('Errore export: ' + e.message); }
    });
  </script>

  <script type="module" src="/nav.js?v=15_20260225222215"></script>
  <script src="scripts/dashboard-menu.js?v=15_20260225222215"></script>
</body>
</html>

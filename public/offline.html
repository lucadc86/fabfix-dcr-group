<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — DCR GROUP</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
    .offline-box{max-width:420px}
    .offline-icon{font-size:64px;margin-bottom:16px}
    h1{font-size:24px;font-weight:900;margin:0 0 10px}
    p{color:#64748b;margin:0 0 20px}
    button{padding:12px 28px;border-radius:14px;background:#2563eb;color:#fff;font-weight:800;border:none;cursor:pointer;font-size:16px}
    button:hover{background:#1d4ed8}
  </style>
</head>
<body>
  <div class="offline-box">
    <div class="offline-icon">📡</div>
    <h1>Sei offline</h1>
    <p>Controlla la connessione Internet e riprova.</p>
    <button onclick="window.location.reload()">↺ Riprova</button>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
  <base href="/">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Scheda fornitore</title>

  <link rel="stylesheet" href="./styles.css?v=15_20260225222215" />
  <link rel="stylesheet" href="./supplier.css?v=15_20260225222215" />
  <script type="module" src="/auth-guard.js"></script>
</head>

<body class="page">

<header class="top-bar">
  <button class="back-btn" onclick="window.location.href='index.html'">←</button>
  <span class="page-title">Scheda fornitore</span>

  <select id="quickNav" class="quick-nav"><option value="">Vai a…</option><option value="index.html">HOME</option><option value="clients.html">CLIENTI</option><option value="suppliers.html">FORNITORI</option><option value="scadenze.html">SCADENZE</option><option value="incassi.html">INCASSI</option><option value="spese.html">SPESE</option><option value="listini.html">LISTINI</option><option value="statistiche.html">STATISTICHE</option><option value="agenda.html">AGENDA</option><option value="ordini-clienti.html">ORDINI CLIENTI</option></select>
</header>

<main class="page-content">

  <div class="section-head">
    <div class="flag-line left"></div>
    <div class="pill-title">
      <span class="pill-icon">←</span>
      <span>SCHEDA FORNITORE</span>
    </div>
    <div class="flag-line right"></div>
  </div>

  <h1 id="supplierNameTitle">Nuovo fornitore</h1>

  <!-- DATI FORNITORE -->
  <div class="card-block">
    <div class="form-grid">
      <div class="form-group">
        <label>Nome fornitore</label>
        <input type="text" id="name" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" />
      </div>

      <div class="form-group">
        <label>Telefono</label>
        <input type="text" id="phone" />
      </div>

      <div class="form-group">
        <label>Comune</label>
        <input type="text" id="city" />
      </div>

      <div class="form-group">
        <label>P. IVA</label>
        <input type="text" id="vat" />
      </div>
    </div>

    <button id="saveSupplier" class="primary-btn">Salva fornitore</button>
  </div>

  <hr class="sep" />

  <!-- FATTURE -->
  <h2>Fatture fornitore</h2>
  <p class="invoice-total"><strong>Totale annuo: € <span id="totalYear">0.00</span></strong></p>

  <div class="invoice-toolbar">
    <button id="addInvoiceBtn" class="primary-btn">+ Aggiungi fattura</button>
  </div>

  <div id="invoiceForm" class="invoice-form hidden">
    <div class="form-grid">
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="invoiceDate">
      </div>

      <div class="form-group">
        <label>Importo €</label>
        <input type="number" id="invoiceAmount" step="0.01">
      </div>
    </div>

    <div class="invoice-actions">
      <button id="saveInvoiceBtn" class="primary-btn">Salva fattura</button>
      <button id="cancelInvoiceBtn" class="ghost-btn">Annulla</button>
    </div>
  </div>

  <div id="invoiceList" class="list"></div>

</main>

<script type="module" src="./supplier.js?v=15_20260225222215"></script>
  <script type="module" src="/nav.js?v=15_20260225222215"></script>
  <script src="scripts/dashboard-menu.js?v=15_20260225222215"></script>
</body>
</html>

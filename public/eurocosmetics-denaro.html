<!DOCTYPE html>
<html lang="it">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
  <base href="/">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EUROCOSMETICS DENARO</title>
  <style>
:root{
  --bg:#f5f7fb;--card:#ffffff;--text:#1f2937;--muted:#6b7280;--line:#e5e7eb;
  --brand:#1f4fd8;--brand2:#163da8;--radius:14px;
}
*{box-sizing:border-box;font-family:"Segoe UI",system-ui,-apple-system,sans-serif}
body{margin:0;background:var(--bg);color:var(--text)}
/* Top bar */
.top-bar{
  position:fixed;top:0;left:0;right:0;height:64px;
  background:#fff;display:flex;align-items:center;gap:12px;
  padding:0 16px;border-bottom:1px solid var(--line);z-index:1000;
}
.back-btn{
  background:var(--brand);color:#fff;border:none;font-size:18px;line-height:1;
  padding:10px 14px;border-radius:12px;cursor:pointer;
}
.back-btn:hover{background:var(--brand2)}
.page-title{font-weight:700;font-size:16px;letter-spacing:.2px}
.page-content{max-width:1100px;margin:0 auto;padding:92px 16px 24px}
.h1{font-size:28px;margin:0 0 12px;font-weight:800}
.sub{color:var(--muted);font-size:13px;margin:0 0 16px}
/* toolbar */
.toolbar{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:12px}
.search{
  flex:1;min-width:240px;padding:12px 14px;border-radius:12px;border:1px solid #d1d5db;
  outline:none;background:#fff
}
.search:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(31,79,216,.12)}
.badge{background:var(--brand);color:#fff;border-radius:999px;padding:8px 12px;font-weight:700;font-size:13px}
/* table */
.table-wrap{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;
  box-shadow:0 14px 30px rgba(0,0,0,.06);
}
table{width:100%;border-collapse:collapse;font-size:14px;table-layout:fixed}
thead th{
  position:sticky;top:0;background:#f8fafc;z-index:1;text-align:left;
  padding:12px;border-bottom:1px solid var(--line);font-weight:800;
}
tbody td{padding:10px 12px;border-bottom:1px solid #eef2f7;vertical-align:middle}
tbody tr:hover{background:#f6f8ff}
.col-desc{font-weight:700}
.num{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.footer-note{margin-top:10px;color:var(--muted);font-size:12px}
/* larghezze colonne */
.price-table thead th:nth-child(1), .price-table tbody td:nth-child(1){width:72%}
.price-table thead th:nth-child(2), .price-table tbody td:nth-child(2){width:28%}

@media (max-width:560px){
  .top-bar{height:58px}
  .page-content{padding-top:82px}
  .h1{font-size:24px}
  table{font-size:13px}
  thead th, tbody td{padding:10px}
  thead th{white-space:normal}
}
/* Dark mode */
:root:not(.theme-light){--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--line:rgba(255,255,255,.12)}
:root:not(.theme-light) thead th{background:#1e293b;color:#94a3b8;border-bottom-color:rgba(255,255,255,.10)}
:root:not(.theme-light) tbody td{border-bottom-color:rgba(255,255,255,.08)}
:root:not(.theme-light) tbody tr:hover{background:rgba(255,255,255,.04)}
  </style>
</head>
<body>
  <header class="top-bar">
    <button class="back-btn" onclick="window.location.href='index.html'">←</button>
    <span class="page-title">EUROCOSMETICS DENARO</span>
  
  <select id="quickNav" class="quick-nav"><option value="">Vai a…</option><option value="index.html">HOME</option><option value="clients.html">CLIENTI</option><option value="suppliers.html">FORNITORI</option><option value="scadenze.html">SCADENZE</option><option value="incassi.html">INCASSI</option><option value="spese.html">SPESE</option><option value="listini.html">LISTINI</option><option value="statistiche.html">STATISTICHE</option><option value="agenda.html">AGENDA</option><option value="ordini-clienti.html">ORDINI CLIENTI</option></select>
</header>

  <main class="page-content">
    <h1 class="h1">EUROCOSMETICS DENARO</h1>
    <p class="sub">Listino prezzi</p>

    <div class="toolbar">
      <input id="search" class="search" type="text" placeholder="Cerca prodotto..." autocomplete="off" />
      <span id="countBadge" class="badge">0</span>
    </div>

    <div class="table-wrap">
      <table class="price-table" aria-label="Listino prezzi EUROCOSMETICS DENARO">
        <thead>
          <tr>
            <th>Prodotto</th>
            <th class="num">Prezzo</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div class="footer-note" id="shownInfo"></div>
  </main>

  <script>
const ITEMS = [{"descrizione": "MANTELLINE MONOUSO GIGANTI X 20PZ LB", "prezzo": 1.5}, {"descrizione": "MANTELLINE MONOUSO X 30 PZ ROIAL/CPM/LB", "prezzo": 1.05}, {"descrizione": "PROPOSE LACCA NO GAS 5 ULTRA FORTE 300ML", "prezzo": 3.0}, {"descrizione": "PROPOSE LACCA SPRAY 3 EXTRA FORTE 500ML", "prezzo": 3.1}, {"descrizione": "PROPOSE LUCIDANTE DIAMOND GLOSS 300ML", "prezzo": 3.1}, {"descrizione": "PROPOSE MOUSSE CURLING RAVVIVARICCI 250ML", "prezzo": 3.3}, {"descrizione": "PROPOSE TERMOPROTETTORE SPRAY 300ML", "prezzo": 3.25}, {"descrizione": "OVER COLOR TINTURA 100 ML", "prezzo": 1.53}, {"descrizione": "RCP TINTURA ART FUSION NEW 100ML", "prezzo": 1.95}, {"descrizione": "EPP OSSIGENO PROFESSIONAL 10/20/30/40VOL 1LT", "prezzo": 1.45}, {"descrizione": "AP- PHON PROFESS. INFINITY 2000 WATT", "prezzo": 14.0}, {"descrizione": "AP- PHON EXCLUSIVE", "prezzo": 38.0}, {"descrizione": "AP- PIASTRA EXCLUSIVE", "prezzo": 56.0}, {"descrizione": "BHN NEUTROSAN RAVVIVARICCI GLAZE 250 ML", "prezzo": 2.75}, {"descrizione": "BHN NEUTROSAN CURL ROCK 100 ML", "prezzo": 3.0}, {"descrizione": "BHN JEBEL KIT PERFECT LISS 12 SETT.", "prezzo": 13.5}, {"descrizione": "BHN JEBEL BALSAMO IDRAT. 200ML", "prezzo": 4.5}, {"descrizione": "BHN JEBEL SHAMPOO IDRAT. 200ML", "prezzo": 4.5}, {"descrizione": "BHN JEBEL KIT PERFECT LISS NANOPLASTIA 500ML", "prezzo": 63.5}, {"descrizione": "BHN JEBEL KIT NANOPLASTIA LISS", "prezzo": 13.5}, {"descrizione": "EPP SHAMPOO DELICATE SOUND ALOE LAV.", "prezzo": 12.9}, {"descrizione": "EPP SHAMPOO PROFESSIONAL MANDORLA NUTRIT.", "prezzo": 12.9}, {"descrizione": "EPP SHAMPOO PROFESSIONAL MELA ANTIGRASSO", "prezzo": 12.9}, {"descrizione": "EPP SHAMPOO PROFESSIONAL MOU E PANNA", "prezzo": 12.9}, {"descrizione": "EPP SHAMPOO PROFESSIONAL PESCA LAV. FREQU.", "prezzo": 12.9}, {"descrizione": "STAGNOLA SCATOLATA 12 CM", "prezzo": 2.8}, {"descrizione": "STAGNOLA 15CM", "prezzo": 3.1}, {"descrizione": "STAGNOLA 20CM", "prezzo": 5.3}, {"descrizione": "STAGNOLA 30 CM", "prezzo": 7.4}];
const tbody = document.querySelector("#tbody");
const searchInput = document.querySelector("#search");
const countBadge = document.querySelector("#countBadge");
const shownInfo = document.querySelector("#shownInfo");

function euro(v){
  if(v === null || v === undefined || Number.isNaN(v)) return "";
  return new Intl.NumberFormat('it-IT', { style:'currency', currency:'EUR' }).format(v);
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function render(list){
  tbody.innerHTML = "";
  const frag = document.createDocumentFragment();
  for(const it of list){
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><div class="col-desc">${escapeHtml(it.descrizione)}</div></td>
      <td class="num">${euro(it.prezzo)}</td>
    `;
    frag.appendChild(tr);
  }
  tbody.appendChild(frag);
  countBadge.textContent = `${list.length} / ${ITEMS.length}`;
  shownInfo.textContent = `Mostrati ${list.length} articoli su ${ITEMS.length}.`;
}

function applyFilter(){
  const q = searchInput.value.trim().toLowerCase();
  if(!q) return render(ITEMS);
  const filtered = ITEMS.filter(it => (it.descrizione || "").toLowerCase().includes(q));
  render(filtered);
}

searchInput.addEventListener("input", applyFilter);
render(ITEMS);
  </script>
  <script type="module" src="/nav.js?v=15_20260225222215"></script>
  <script src="scripts/dashboard-menu.js?v=15_20260225222215"></script>
</body>
</html>

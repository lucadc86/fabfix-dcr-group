<!DOCTYPE html>
<html lang="it">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Accesso — DCR GROUP</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:#0b1a2a;
      color:#eaf0ff;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .card{
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
      border-radius:20px;
      padding:36px 32px;
      width:100%;
      max-width:380px;
      box-shadow:0 20px 60px rgba(0,0,0,.4);
    }
    .logo{
      text-align:center;
      margin-bottom:28px;
    }
    .logo img{
      width:64px;
      height:64px;
      border-radius:12px;
      object-fit:cover;
      margin-bottom:10px;
    }
    .logo h1{
      font-size:1.6rem;
      font-weight:900;
      letter-spacing:.5px;
    }
    .logo p{
      font-size:.85rem;
      opacity:.6;
      margin-top:4px;
    }
    label{
      display:block;
      font-size:.8rem;
      font-weight:600;
      opacity:.7;
      margin-bottom:5px;
      margin-top:16px;
    }
    input{
      width:100%;
      padding:12px 14px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.15);
      border-radius:10px;
      color:#eaf0ff;
      font-size:1rem;
      outline:none;
      transition:border-color .2s;
    }
    input:focus{border-color:rgba(20,140,255,.7)}
    button{
      width:100%;
      margin-top:24px;
      padding:13px;
      background:#148cff;
      color:#fff;
      border:none;
      border-radius:12px;
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
      transition:opacity .2s;
    }
    button:disabled{opacity:.5;cursor:default}
    #errMsg{
      margin-top:14px;
      padding:10px 12px;
      background:rgba(255,60,60,.15);
      border:1px solid rgba(255,60,60,.3);
      border-radius:10px;
      font-size:.85rem;
      color:#ff9090;
      display:none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/img/logo.png" alt="DCR GROUP" onerror="this.style.display='none'">
      <h1>DCR GROUP</h1>
      <p>Accesso gestionale staff</p>
    </div>
    <form id="loginForm">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="email@esempio.com" required autocomplete="email">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Password" required autocomplete="current-password">
      <button id="loginBtn" type="submit">Accedi</button>
    </form>
    <div id="errMsg"></div>
  </div>
  <script type="module" src="/login.js"></script>
</body>
</html>

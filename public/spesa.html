<!DOCTYPE html>
<html lang="it">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
  <base href="/">

  <meta charset="UTF-8">
  <title>Scheda spesa</title>
  <link rel="stylesheet" href="./styles.css?v=15_20260225222215">
  <style>
    /* ── Inline form validation ── */
    .form-group input.field-error {
      border-color: #ef4444 !important;
      box-shadow: 0 0 0 3px rgba(239,68,68,.12) !important;
    }
    .form-group .field-error-msg {
      color: #ef4444;
      font-size: 11px;
      font-weight: 700;
      margin-top: 3px;
      display: none;
    }
    .form-group input.field-error + .field-error-msg { display: block; }
    .form-group input.field-ok { border-color: #16a34a !important; }
  </style>
</head>

<body class="page">

<header class="top-bar">
  <button class="back-btn" onclick="window.location.href='index.html'">←</button>
  <span class="page-title">Scheda spesa</span>

  <select id="quickNav" class="quick-nav"><option value="">Vai a…</option><option value="index.html">HOME</option><option value="clients.html">CLIENTI</option><option value="suppliers.html">FORNITORI</option><option value="scadenze.html">SCADENZE</option><option value="incassi.html">INCASSI</option><option value="spese.html">SPESE</option><option value="listini.html">LISTINI</option><option value="statistiche.html">STATISTICHE</option><option value="agenda.html">AGENDA</option><option value="ordini-clienti.html">ORDINI CLIENTI</option></select>
</header>

<main class="page-content">

  <h1 id="dayTitle"></h1>

  <div class="form-grid">

    <div class="form-group">
      <label>Nota spesa</label>
      <input type="text" id="note">
      <span class="field-error-msg">Inserisci una descrizione</span>
    </div>

    <div class="form-group">
      <label>Importo spesa €</label>
      <input type="number" id="amount" step="0.01">
      <span class="field-error-msg">Inserisci un importo valido (> 0)</span>
    </div>

  </div>

  <button id="saveExpense" class="primary-btn">Salva spesa</button>

  <h2>Spese del giorno</h2>

  <p><strong>Totale giorno: € <span id="dayTotal">0.00</span></strong></p>

  <div id="expensesList" class="list"></div>

</main>

<script type="module" src="./spesa.js?v=15_20260225222215"></script>
  <script type="module" src="/nav.js?v=15_20260225222215"></script>
  <script src="scripts/dashboard-menu.js?v=15_20260225222215"></script>
</body>
</html>

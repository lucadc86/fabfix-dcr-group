<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Listino LISAP</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./listini.css" />
  <style>
    .lisap-wrap{ max-width: 1200px; margin: 0 auto; }
    .lisap-head{ display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
    .lisap-tools{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .lisap-search{ flex: 1; min-width: 260px; }
    .lisap-table{ width:100%; border-collapse: collapse; }
    .lisap-table th,.lisap-table td{ padding:10px 10px; border-bottom:1px solid rgba(0,0,0,.08); vertical-align:middle; }
    .lisap-table th{ text-align:left; font-weight:800; position:sticky; top:0; background: #fff; z-index:2; }
    .qty{ width:84px; }
    .right{ text-align:right; }
    .pill{ padding:6px 10px; border-radius: 999px; background: rgba(59,130,246,.10); font-weight:800; }
    .totalbar{ display:flex; justify-content:flex-end; gap:14px; align-items:center; padding: 12px 0; }
    .totalbar b{ font-size: 20px; }
    .sticky-actions{ position:sticky; bottom: calc(env(safe-area-inset-bottom) + 10px); display:flex; justify-content:flex-end; padding: 10px 0; background: linear-gradient(to top, rgba(255,255,255,1), rgba(255,255,255,.6)); z-index:15;} .top-actions{position:sticky; top:calc(env(safe-area-inset-top) + 76px); z-index:16; justify-content:flex-end; background:rgba(255,255,255,.96); backdrop-filter: blur(8px); border-bottom:1px solid rgba(0,0,0,.06);} .compact th,.compact td{ padding:6px 8px; font-size:12px; } .compact .qty{ width:72px; } .lisap-meta{ font-size:11px; opacity:.72; margin-top:2px; } .fixed-actions{position:fixed; right:16px; bottom:16px; z-index:60; display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; max-width:min(820px, calc(100vw - 32px)); background:rgba(255,255,255,.97); border:1px solid rgba(0,0,0,.08); border-radius:18px; padding:10px 12px; box-shadow:0 10px 30px rgba(0,0,0,.16);} @media (max-width:760px){ .fixed-actions{left:10px; right:10px; bottom:10px; justify-content:space-between;} .fixed-actions .btn{flex:1 1 calc(50% - 8px);} }
  </style>
  <script type="module" src="/auth-guard.js"></script>
</head>
<body>
  <header class="top-bar incassi-topbar lisap-topbar">
    <a class="back-btn" href="listini.html" aria-label="Indietro">←</a>
    <span class="page-title">Listino LISAP</span>
    
  </header>

  <main class="page-content lisap-page">
    <div class="lisap-wrap">
      <div class="lisap-head">
        <div>
          <h1 style="margin:0;">Listino LISAP</h1>
          <div style="opacity:.75; margin-top:4px;">Inserisci quantità, cerca prodotto e genera PDF ordine.</div>
        </div>
        <div class="lisap-tools">
          <input class="search-input lisap-search" id="q" placeholder="Cerca prodotto…" />
          <span class="pill" id="countPill">—</span>
          <button class="btn" id="btnReset" type="button">Reset quantità</button>
        </div>
      </div>
      <div style="margin-top:14px; overflow:auto; border-radius: 14px; border:1px solid rgba(0,0,0,.08); background:#fff;">
        <table class="lisap-table compact" aria-label="Listino LISAP">
          <thead>
            <tr><th style="min-width:260px;">Prodotto</th><th>Codice</th><th>Linea</th><th>Vol.</th><th class="right">Prezzo</th><th class="right">Conf.</th><th class="right">Pallet</th><th>Barcode</th><th class="right">Qta</th><th class="right">Totale</th></tr>
          </thead>
          <tbody id="rows"></tbody>
          <tbody id="manualRows"></tbody>
        </table>
      </div>

      <div class="card" style="margin-top:14px; padding:14px 16px;">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
          <div>
            <div style="font-weight:800;">Righe libere</div>
            <div style="opacity:.72; font-size:13px;">Aggiungi prodotti fuori listino con descrizione, quantità e prezzo.</div>
          </div>
          <button class="btn" id="btnAddManualRow" type="button">+ Aggiungi riga libera</button>
        </div>
      </div>

      <div class="totalbar">
        <span style="opacity:.75;">Totale ordine</span>
        <b id="grandTotal">—</b>
      </div>
      <div class="fixed-actions lisap-fixed-actions">
        <button class="btn" id="btnSaveOrderFixed" type="button">Salva ordine</button>
        <button class="btn" id="btnEmailOrderFixed" type="button">Invia per email</button>
        <button class="btn" id="btnWhatsappOrderFixed" type="button">Invia WhatsApp</button>
        <button class="btn primary" id="btnPdfFixed" type="button">Stampa PDF ordine</button>
      </div>
</div>
  </main>

  <!-- libs -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script type="module" src="./lisapOrder.js?v=69_20260306235000"></script>
  <script src="scripts/dashboard-menu.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
  <base href="/">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agenda</title>

  <!-- FullCalendar (CDN) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/interaction.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/locales-all.global.min.js"></script>

  <style>
    :root{
      --bg:#f5f7fb; --card:#fff; --text:#1f2937; --muted:#6b7280; --line:#e5e7eb;
      --brand:#1f4fd8; --brand2:#163da8; --radius:14px;
    }
    *{box-sizing:border-box;font-family:"Segoe UI",system-ui,-apple-system,sans-serif}
    body{margin:0;background:var(--bg);color:var(--text)}
    .top-bar{
      position:fixed;top:0;left:0;right:0;height:64px;
      background:#fff;display:flex;align-items:center;gap:12px;
      padding:0 16px;border-bottom:1px solid var(--line);z-index:1000;
    }
    .back-btn{background:var(--brand);color:#fff;border:none;font-size:18px;line-height:1;
      padding:10px 14px;border-radius:12px;cursor:pointer}
    .back-btn:hover{background:var(--brand2)}
    .page-title{font-weight:800;font-size:16px}
    .page-content{max-width:1200px;margin:0 auto;padding:92px 16px 24px}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:14px;
      box-shadow:0 10px 25px rgba(0,0,0,.06);
    }
    .hint{margin:10px 2px 14px;color:var(--muted);font-size:13px;line-height:1.35}
    #calendar{background:#fff;border-radius:12px}

    /* ✅ Responsive toolbar FullCalendar */
    .fc .fc-toolbar.fc-header-toolbar{flex-wrap:wrap;gap:10px}
    .fc .fc-toolbar-chunk{display:flex;flex-wrap:wrap;gap:10px}
    @media (max-width:700px){
      .fc .fc-toolbar-title{font-size:18px}
      .fc .fc-button{padding:6px 10px}
    }
    .row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .badge{
      display:inline-flex;align-items:center;gap:8px;
      background:#eef2ff;color:#111827;border:1px solid #e5e7eb;
      border-radius:999px;padding:8px 12px;font-weight:800;font-size:13px;
    }
    .dot{width:10px;height:10px;border-radius:999px;background:var(--brand)}
    .btn{
      background:var(--brand);color:#fff;border:none;border-radius:12px;
      padding:10px 14px;font-weight:800;cursor:pointer
    }
    .btn:hover{background:var(--brand2)}

    /* ✅ Migliora interazioni touch su iPhone (tap affidabile) */
    #calendar{touch-action:manipulation}
    .fc{ -webkit-user-select:none; user-select:none; }

    /* ✅ Modal elegante */
    .modal-backdrop{
      position:fixed;inset:0;background:rgba(0,0,0,.38);
      display:none;align-items:center;justify-content:center;
      width:100vw;
      height:100vh;              /* fallback */
      height:100dvh;             /* iOS 16+ */
      min-height:100vh;
      min-height:100dvh;
      min-height:-webkit-fill-available; /* iOS Safari */
      /* iPhone safe-area + centro perfetto */
      padding:
        max(18px, env(safe-area-inset-top))
        max(18px, env(safe-area-inset-right))
        max(18px, env(safe-area-inset-bottom))
        max(18px, env(safe-area-inset-left));
      z-index:2000;
      overscroll-behavior:contain;
    }
    .modal{
      width:min(520px, 100%);
      background:#fff;border-radius:16px;
      box-shadow:0 30px 80px rgba(0,0,0,.25);
      border:1px solid rgba(229,231,235,.9);
      overflow:hidden;
      margin:auto;
      max-height:calc(100vh - 36px);
      max-height:calc(100dvh - 36px);
      display:flex;
      flex-direction:column;
    }
    .modal-head{
      padding:14px 16px;
      background:linear-gradient(180deg,#ffffff,#f6f8ff);
      border-bottom:1px solid var(--line);
      display:flex;align-items:center;justify-content:space-between;gap:10px;
    }
    .modal-title{font-weight:900}
    .modal-close{
      background:transparent;border:none;font-size:22px;line-height:1;
      cursor:pointer;color:#111827;padding:4px 8px;border-radius:10px;
    }
    .modal-close:hover{background:#eef2ff}
    .modal-body{padding:14px 16px;display:grid;gap:10px;overflow:auto;-webkit-overflow-scrolling:touch}
    .field label{display:block;font-size:12px;font-weight:800;color:var(--muted);margin:0 0 6px}
    .field input,.field textarea{
      width:100%;padding:12px 12px;border-radius:12px;
      border:1px solid #d1d5db;outline:none;background:#fff;font-size:14px;
    }
    .field textarea{min-height:86px;resize:vertical}
    .field input:focus,.field textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(31,79,216,.12)}
    .modal-actions{
      padding:14px 16px;border-top:1px solid var(--line);
      display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;
      background:#fff;
    }
    .btn-secondary{background:#eef2ff;color:#111827;border:1px solid #e5e7eb}
    .btn-secondary:hover{background:#e7ecff}
    .btn-danger{background:#ef4444}
    .btn-danger:hover{background:#dc2626}

    /* Colonne agenda colorate (pastello) */
    .fc-day-sun, .fc-col-header-cell.fc-day-sun { background:#FFF8E1 !important; }
    .fc-day-mon, .fc-col-header-cell.fc-day-mon { background:#E8F5E9 !important; }
    .fc-day-tue, .fc-col-header-cell.fc-day-tue { background:#E3F2FD !important; }
    .fc-day-wed, .fc-col-header-cell.fc-day-wed { background:#FCE4EC !important; }
    .fc-day-thu, .fc-col-header-cell.fc-day-thu { background:#FFFDE7 !important; }
    .fc-day-fri, .fc-col-header-cell.fc-day-fri { background:#F3E5F5 !important; }
    .fc-day-sat, .fc-col-header-cell.fc-day-sat { background:#E0F7FA !important; }

    /* No scroll laterale */
    html, body { overflow-x:hidden; }
    @media (max-width:560px){
      .top-bar{height:58px}
      .page-content{padding-top:82px}
    }

    /* ✅ Viewport basso (iPad/PC con barra browser): fai entrare tutto senza scroll */
    @media (max-height: 720px){
      .modal{width:min(560px, 100%); max-height:calc(100dvh - 22px)}
      .modal-head{padding:10px 12px}
      .modal-body{padding:10px 12px; gap:8px; overflow:visible; grid-template-columns:1fr 1fr}
      .modal-body > .field:nth-child(1){grid-column:1 / -1}
      .modal-body > .field:nth-child(2){grid-column:1 / -1}
      .field textarea{min-height:60px; resize:none}
      .field input,.field textarea{padding:10px 10px; border-radius:12px; font-size:14px}
      .modal-actions{padding:10px 12px}
      .modal-actions .btn{padding:10px 14px; border-radius:14px}
    }
    .quick-nav,.nav-select{display:none !important}
    .modal.readonly .field input,.modal.readonly .field textarea{background:#f8fafc;color:#475569}
    .modal.readonly #btnSave,.modal.readonly #btnDelete{display:none !important}
  </style>
  <script type="module" src="/auth-guard.js"></script>
</head>

<body>
  <header class="top-bar">
    <button class="back-btn" onclick="window.location.href='index.html'">←</button>
    <span class="page-title">Agenda</span>
</header>

  <main class="page-content">
    <div class="row">
      <div class="badge"><span class="dot"></span> Eventi salvati su Firebase</div>
      <button class="btn" id="reloadBtn" type="button">Ricarica</button>
    </div>
    <div class="hint">
      Tocca/clicca un giorno per aggiungere un evento. Clicca un evento per modificarlo o eliminarlo.
      Vista: mese / settimana / giorno.
    </div>

    <div class="card">
      <div id="calendar"></div>
    </div>
  </main>

  <!-- ✅ MODAL EVENTO -->
  <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title" id="modalTitle">Evento</div>
        <button class="modal-close" id="modalX" type="button" aria-label="Chiudi">×</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label for="evtTitle">Titolo / Note</label>
          <textarea id="evtTitle" placeholder="Es: Cliente Rossi – Taglio + Piega"></textarea>
        </div>
        <div class="field" style="display:flex;gap:10px;align-items:center;">
          <input id="evtAllDay" type="checkbox" />
          <label for="evtAllDay" style="margin:0;font-weight:800;color:var(--muted);">Tutto il giorno</label>
        </div>
        <div class="field">
          <label for="evtStart">Inizio</label>
          <input id="evtStart" type="datetime-local" />
        </div>
        <div class="field">
          <label for="evtEnd">Fine</label>
          <input id="evtEnd" type="datetime-local" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-danger" id="btnDelete" type="button">Elimina</button>
        <button class="btn btn-secondary" id="btnCancel" type="button">Chiudi</button>
        <button class="btn" id="btnSave" type="button">Salva</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { db } from "./firebase.js";
    import {
      collection, addDoc, updateDoc, deleteDoc, doc,
      onSnapshot, query, orderBy, getDocs
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const col = collection(db, "agendaEvents");

    let calendar;
    let unsub = null;

    // --- Modal UI ---
    const backdrop = document.getElementById('modalBackdrop');
    const mTitle = document.getElementById('modalTitle');
    const inTitle = document.getElementById('evtTitle');
    const inStart = document.getElementById('evtStart');
    const inEnd = document.getElementById('evtEnd');
    const inAllDay = document.getElementById('evtAllDay');
    const btnDelete = document.getElementById('btnDelete');
    const btnCancel = document.getElementById('btnCancel');
    const btnSave = document.getElementById('btnSave');

    let editingEventId = null;
    let clientsById = new Map();
    let clientsByNormName = new Map();

    function normName(v){
      return String(v || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,' ').trim();
    }

        async function loadClientMaps(){
      clientsById = new Map();
      clientsByNormName = new Map();
      try{
        const snap = await getDocs(collection(db, 'clients'));
        snap.forEach((d)=>{
          const data = d.data() || {};
          const name = String(data.name || data.nome || '').trim();
          if(!name) return;
          clientsById.set(d.id, name);
          const key = normName(name);
          if(key && !clientsByNormName.has(key)) clientsByNormName.set(key, name);
        });
      }catch(e){ console.warn('client maps', e); }
    }

    function resolveClientName(data = {}, fallback='Cliente'){
      const direct = [
        data.clientName, data.nomeCliente, data.clienteName, data.customerName,
        data.cliente, data.name, data.titleName
      ].find(v => String(v || '').trim() && !/^cliente$/i.test(String(v).trim()));
      if(direct) return String(direct).trim();
      const cid = data.clientId || data.customerId || data.clienteId;
      if(cid && clientsById.has(cid)) return clientsById.get(cid);
      if(Array.isArray(data.entries)){
        for(const entry of data.entries){
          const n = [entry?.clientName, entry?.nomeCliente, entry?.cliente].find(v => String(v || '').trim() && !/^cliente$/i.test(String(v).trim()));
          if(n) return String(n).trim();
          const ecid = entry?.clientId || entry?.clienteId;
          if(ecid && clientsById.has(ecid)) return clientsById.get(ecid);
        }
      }
      const note = String(data.note || data.noteText || data.description || '').trim();
      if(note){
        const firstLine = note.split(/\n+/).map(s=>s.trim()).find(Boolean) || '';
        const cleaned = firstLine.replace(/[0-9.,€+\-/*()]+/g,' ').replace(/\s+/g,' ').trim();
        const nkey = normName(cleaned);
        if(nkey && clientsByNormName.has(nkey)) return clientsByNormName.get(nkey);
        if(cleaned && !/^cliente$/i.test(cleaned)) return cleaned;
      }
      return fallback;
    }

    function resolveAmount(data = {}, fallbackKeys = []){
      for(const key of fallbackKeys){
        const num = Number(data?.[key]);
        if(Number.isFinite(num) && num !== 0) return num;
      }
      if(Array.isArray(data.entries)){
        const total = data.entries.reduce((s,entry)=> s + (Number(entry?.amount)||0), 0);
        if(total) return total;
      }
      return Number(data.amount || data.total || data.importo || 0) || 0;
    }

    function eur(n){
      return new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR'}).format(Number(n)||0);
    }

    function openModal({ mode, id, title, start, end, allDay, readonly=false }){
      editingEventId = id || null;
      mTitle.textContent = readonly ? 'Dettaglio evento' : ((mode === 'edit') ? 'Modifica evento' : 'Nuovo evento');
      inTitle.value = title || '';
      inAllDay.checked = !!allDay;
      inStart.value = start ? start.slice(0,16) : '';
      inEnd.value = end ? end.slice(0,16) : '';
      btnDelete.style.display = (!readonly && mode === 'edit') ? 'inline-block' : 'none';
      btnSave.style.display = readonly ? 'none' : 'inline-block';
      inTitle.readOnly = !!readonly;
      inStart.readOnly = !!readonly;
      inEnd.readOnly = !!readonly;
      inAllDay.disabled = !!readonly;
      backdrop.querySelector('.modal')?.classList.toggle('readonly', !!readonly);
      backdrop.style.display = 'flex';
      backdrop.setAttribute('aria-hidden', 'false');
      document.documentElement.style.overflow = 'hidden';
      document.body.style.overflow = 'hidden';
      setTimeout(() => inTitle.focus(), 30);
    }

    function closeModal(){
      backdrop.style.display = 'none';
      backdrop.setAttribute('aria-hidden', 'true');
      editingEventId = null;
      btnSave.style.display = 'inline-block';
      inTitle.readOnly = false;
      inStart.readOnly = false;
      inEnd.readOnly = false;
      inAllDay.disabled = false;
      backdrop.querySelector('.modal')?.classList.remove('readonly');
      document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
    }

    backdrop.addEventListener('click', (e) => {
      if(e.target === backdrop) closeModal();
    });
    btnCancel.addEventListener('click', closeModal);

    function toISO(d){
      if(!d) return null;
      const pad = (n)=> String(n).padStart(2,'0');
      const y=d.getFullYear(), m=pad(d.getMonth()+1), day=pad(d.getDate());
      const hh=pad(d.getHours()), mm=pad(d.getMinutes());
      return `${y}-${m}-${day}T${hh}:${mm}:00`;
    }

    function addMinutes(date, minutes){
      return new Date(date.getTime() + minutes*60000);
    }

    function fromAny(v){
      // v potrebbe essere string ISO (salvata da noi) oppure Timestamp (se lo metti in futuro)
      if(!v) return null;
      if(typeof v === "string") return v;
      if(v.toDate) return v.toDate().toISOString();
      return null;
    }

    // 🔄 Carica eventi anche da altre collezioni per avere un'agenda unica (solo lettura)
    async function loadExternalEvents(){
      const ext = [];
      const addMinutesSafe = (d, m) => new Date(d.getTime() + m*60000);
      const orderMap = new Map();

      function extractDate(data, docId){
        if(data?.date && typeof data.date.toDate === 'function') return data.date.toDate();
        if(data?.createdAt && typeof data.createdAt.toDate === 'function') return data.createdAt.toDate();
        if(data?.updatedAt && typeof data.updatedAt.toDate === 'function') return data.updatedAt.toDate();
        const str = data?.date || data?.orderDate || data?.dataOrdine || data?.createdAtISO;
        if(typeof str === 'string' && str){
          if(/^\d{4}-\d{2}-\d{2}$/.test(str)) return new Date(str + 'T00:00:00');
          const d = new Date(str);
          if(!isNaN(d.getTime())) return d;
        }
        if(typeof docId === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(docId)) return new Date(docId + 'T00:00:00');
        return null;
      }

      const pushEvt = (id, title, dt, minutes=30, extra={}) => {
        if(!dt || !title) return;
        ext.push({ id, title, start: toISO(dt), end: toISO(addMinutesSafe(dt, minutes)), allDay: true, editable:false, extendedProps:{ readonly:true, sourceData: extra } });
      };

      try{
        const snap = await getDocs(collection(db, 'orders'));
        snap.forEach(d => {
          const data=d.data()||{};
          const client=resolveClientName(data, 'Cliente');
          const amount=resolveAmount(data,['total','grandTotal','importo']);
          const dt = extractDate(data, d.id);
          const title = `Ordine • ${client} • ${eur(amount)}`;
          const extra = { ...data, linkedType:'order', linkedId:d.id, resolvedClientName: client, resolvedAmount: amount };
          orderMap.set(d.id, extra);
          pushEvt(`ord_${d.id}`, title, dt, 60, extra);
        });
      }catch(e){ console.warn('agenda orders', e); }

      try{
        const snap = await getDocs(collection(db, 'incassi'));
        snap.forEach(d => {
          const data=d.data()||{};
          const dt = extractDate(data, d.id);
          const linkedOrder = data.orderId ? orderMap.get(String(data.orderId)) : null;
          const client = resolveClientName({ ...(linkedOrder||{}), ...data }, linkedOrder?.resolvedClientName || 'Cliente');
          const amount = resolveAmount(data,['amount','total','importo']) || linkedOrder?.resolvedAmount || 0;
          const title = `Incasso • ${client} • ${eur(amount)}`;
          pushEvt(`inc_${d.id}`, title, dt, 30, { ...data, linkedType:'incasso', linkedId:d.id, resolvedClientName: client, resolvedAmount: amount, linkedOrder });
        });
      }catch(e){ console.warn('agenda incassi', e); }

      return ext;
    }

    function initCalendar(){
      const el = document.getElementById("calendar");

      calendar = new FullCalendar.Calendar(el, {
        locale: "it",
        // Su iPhone: parte in mese (tap più semplice). Su PC: settimana.
        initialView: "dayGridMonth",
        headerToolbar: {
          left: "prev,next today",
          center: "title",
          right: "dayGridMonth,timeGridWeek,timeGridDay,listWeek"
        },
        height: "auto",
        nowIndicator: true,
        selectable: true,
        selectMirror: true,

        // ✅ Drag & drop / resize
        editable: true,
        eventStartEditable: true,
        eventDurationEditable: true,
        dayMaxEvents: true,

        // ✅ Su mobile il tap funziona sempre (anche senza trascinare)
        dateClick: (info) => {
          const start = info.date;
          const allDay = info.allDay === true;
          const end = allDay ? addMinutes(start, 24*60) : addMinutes(start, 30);
          openModal({
            mode: 'create',
            id: null,
            title: '',
            start: toISO(start),
            end: toISO(end),
            allDay
          });
        },

        // (desktop) selezione con drag: apre la stessa finestra
        select: (info) => {
          openModal({
            mode: 'create',
            id: null,
            title: '',
            start: toISO(info.start),
            end: toISO(info.end),
            allDay: info.allDay === true
          });
          calendar.unselect();
        },

        eventClick: (info) => {
          const ev = info.event;
          openModal({
            mode: 'edit',
            id: ev.id,
            title: ev.title || '',
            start: toISO(ev.start),
            end: toISO(ev.end || addMinutes(ev.start, 30)),
            allDay: ev.allDay === true,
            readonly: !!ev.extendedProps?.readonly
          });
        },

        eventDrop: async (info) => { if(info.event.extendedProps?.readonly){ info.revert(); return; }
          const ev = info.event;
          try{
            await updateDoc(doc(db, "agendaEvents", ev.id), {
              start: toISO(ev.start),
              end: toISO(ev.end),
              allDay: ev.allDay === true
            });
          }catch(e){
            info.revert();
          }
        },

        eventResize: async (info) => { if(info.event.extendedProps?.readonly){ info.revert(); return; }
          const ev = info.event;
          try{
            await updateDoc(doc(db, "agendaEvents", ev.id), {
              start: toISO(ev.start),
              end: toISO(ev.end),
              allDay: ev.allDay === true
            });
          }catch(e){
            info.revert();
          }
        }
      });

      calendar.render();

    }

    // --- Azioni modal (salva / elimina) ---
    btnSave.addEventListener('click', async () => {
      const title = (inTitle.value || '').trim();
      const start = inStart.value ? `${inStart.value}:00` : null;
      const end = inEnd.value ? `${inEnd.value}:00` : null;
      const allDay = inAllDay.checked === true;

      if(!title){
        alert('Inserisci un titolo.');
        inTitle.focus();
        return;
      }
      if(!start){
        alert('Inserisci data/ora inizio.');
        return;
      }
      // se manca fine, metti +30 minuti
      const safeEnd = end || (function(){
        const d = new Date(start);
        return toISO(addMinutes(d, allDay ? 24*60 : 30));
      })();

      try{
        if(editingEventId){
          await updateDoc(doc(db, 'agendaEvents', editingEventId), {
            title,
            start,
            end: safeEnd,
            allDay
          });
        }else{
          await addDoc(col, {
            title,
            start,
            end: safeEnd,
            allDay
          });
        }
        closeModal();
      }catch(e){
        alert('Errore salvataggio. Riprova.');
      }
    });

    btnDelete.addEventListener('click', async () => {
      if(!editingEventId) return;
      const ok = confirm('Eliminare questo evento?');
      if(!ok) return;
      try{
        await deleteDoc(doc(db, 'agendaEvents', editingEventId));
        closeModal();
      }catch(e){
        alert('Errore eliminazione. Riprova.');
      }
    });

    function startRealtime(){
      if(unsub) unsub();
      const q = query(col, orderBy("start"));
      unsub = onSnapshot(q, async (snap) => {
        const events = [];
        snap.forEach(d => {
          const data = d.data() || {};
          events.push({
            id: d.id,
            title: data.title || "",
            start: fromAny(data.start),
            end: fromAny(data.end),
            allDay: !!data.allDay
          });
        });

        let external = [];
        try{ external = await loadExternalEvents(); }catch(e){ console.warn('loadExternalEvents', e); }

        calendar.removeAllEvents();
        calendar.addEventSource(events.concat(external));
      });
    }

    document.getElementById("reloadBtn").addEventListener("click", () => {
      startRealtime();
    });

    loadClientMaps().finally(() => {
      initCalendar();
      startRealtime();
    });
